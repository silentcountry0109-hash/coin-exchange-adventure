<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#bde4f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>九九乘法星球｜Danlu Kids Space</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='44' fill='%23f5a623' stroke='%233a3844' stroke-width='6'/><text x='50' y='64' font-size='38' font-weight='bold' text-anchor='middle' fill='%23fff'>9×9</text></svg>">
<link rel="stylesheet" href="css/style.css?v=6">
<link rel="stylesheet" href="css/mul99.css?v=2">
</head>
<body>
<div id="app">

  <!-- 背景 -->
  <div id="bg-sky">
    <div class="cloud c-a"></div>
    <div class="cloud c-b"></div>
    <div class="cloud c-c"></div>
  </div>

  <!-- ================= 標題畫面（選口訣段） ================= -->
  <section id="screen-title" class="screen active">
    <div class="hill h-a"></div>
    <div class="hill h-b"></div>
    <a id="btn-space" class="icon-btn" href="index.html" aria-label="回太空站">🌌</a>
    <div id="logo" aria-label="九九乘法">
      <span>九</span><span>九</span><span>乘</span><span>法</span>
    </div>
    <div id="title-sub">點點卡・跳著數・背口訣</div>
    <div id="title-chars">
      <div id="lottie-title-elephant"></div>
      <div id="lottie-title-shark"></div>
    </div>
    <div id="seg-menu" aria-label="選擇口訣段"></div>
  </section>

  <!-- ================= 遊戲畫面 ================= -->
  <section id="screen-game" class="screen">
    <div class="hill h-a"></div>
    <div class="hill h-b"></div>
    <header id="hud">
      <button id="btn-home" class="icon-btn" aria-label="回選單">🏠</button>
      <div id="problem-display">
        <span id="pd-a"></span><span id="pd-op"></span><span id="pd-b"></span><span id="pd-eq">=</span><span id="pd-q">?</span>
      </div>
      <div id="stars"><i>⭐</i><i>⭐</i><i>⭐</i><i>⭐</i><i>⭐</i></div>
      <button id="btn-sound" class="icon-btn" aria-label="音效開關">🔊</button>
    </header>

    <!-- 陣列區：一排一排的點點卡 -->
    <div id="array-zone">
      <div class="zone-label" id="array-label">點點卡</div>
      <div id="row-slots"></div>
    </div>

    <!-- 跳數序列（填空題用） -->
    <div id="seq-row"></div>

    <!-- 月台：待拖曳的下一排 -->
    <div id="tray99">
      <div id="tray99-label">下一排</div>
      <div id="tray99-slot"></div>
      <div id="tray99-badge"></div>
    </div>

    <div id="mid-row">
      <div id="guide">
        <div id="lottie-guide"></div>
        <div id="sweat">💧</div>
        <div id="bubble"></div>
      </div>
      <div id="stamp-pad">
        <div id="stamp-pad-label">口訣印章</div>
        <div id="stamp-list"></div>
      </div>
    </div>

    <div id="answers"></div>

    <div id="sprite-layer"></div>
    <div id="fx-layer">
      <div id="counter"></div>
      <div id="caption"></div>
      <div id="hint-hand">👆</div>
    </div>
  </section>

  <!-- ================= 結算畫面 ================= -->
  <section id="screen-end" class="screen">
    <div class="hill h-a"></div>
    <div class="hill h-b"></div>
    <div id="end-title">太棒了！</div>
    <div id="end-stars"></div>
    <div id="end-msg"></div>
    <div id="end-chars">
      <img id="end-deco-mammoth" src="assets/deco_news_mammoth.png" alt="">
      <div id="lottie-end-boy"></div>
    </div>
    <div id="end-btns">
      <button id="btn-again" class="big-btn">再玩一次 🔁</button>
      <button id="btn-menu" class="big-btn alt">換一段 📖</button>
    </div>
  </section>

  <img id="rocket-hedgehog" src="assets/deco_news_hedgehog.png" alt="">

  <div id="rotate-overlay">
    <div class="phone-icon">📱</div>
    <div>請把手機轉直來玩喔！</div>
  </div>
</div>

<script src="js/zoomguard.js?v=1"></script>
<script src="js/starmap.js?v=1"></script>
<script src="vendor/lottie.min.js"></script>
<script src="js/characters.js?v=5"></script>
<script src="js/sounds.js?v=7"></script>
<script src="js/engine.js?v=2"></script>
<script src="js/mul99.logic.js?v=1"></script>
<script src="js/mul99.main.js?v=2"></script>
</body>
</html>
