<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#bde4f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>時鐘星球｜看時鐘學時間</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='44' fill='%23fffdf4' stroke='%233a3844' stroke-width='6'/><line x1='50' y1='50' x2='50' y2='24' stroke='%234a7cc9' stroke-width='7' stroke-linecap='round'/><line x1='50' y1='50' x2='68' y2='58' stroke='%23ef6a5a' stroke-width='9' stroke-linecap='round'/><circle cx='50' cy='50' r='6' fill='%233a3844'/></svg>">
<link rel="stylesheet" href="css/style.css?v=6">
<link rel="stylesheet" href="css/clock.css?v=1">
</head>
<body>
<div id="app" class="time-day">

  <!-- 背景：晝夜三層（class 切換、透明度緩變）＋雲朵 -->
  <div id="bg-sky">
    <div class="sky sky-day"></div>
    <div class="sky sky-dusk"></div>
    <div class="sky sky-night"></div>
    <div class="cloud c-a"></div>
    <div class="cloud c-b"></div>
    <div class="cloud c-c"></div>
  </div>

  <!-- ================= 標題畫面 ================= -->
  <section id="screen-title" class="screen active">
    <div class="hill h-a"></div>
    <div class="hill h-b"></div>
    <a id="btn-space" class="icon-btn" href="index.html" aria-label="回太空站">🌌</a>
    <img id="title-deco-bird" src="assets/deco_bird.png" alt="">
    <img id="title-deco-hedgehog" src="assets/deco_hedgehog.png" alt="">
    <div id="logo" aria-label="時鐘星球">
      <span>時</span><span>鐘</span><span>星</span><span>球</span>
    </div>
    <div id="title-sub">看時鐘、撥時鐘的時間教室</div>
    <div id="title-chars">
      <div id="lottie-title-elephant"></div>
      <div id="lottie-title-boy"></div>
    </div>
    <div id="title-menu">
      <button class="mode-btn wide m-lv1" data-mode="lv1">🕐 整點與半點</button>
      <button class="mode-btn wide m-lv2" data-mode="lv2">🕝 幾點幾分</button>
      <button class="mode-btn wide m-lv3" data-mode="lv3">⏱️ 經過時間</button>
    </div>
  </section>

  <!-- ================= 遊戲畫面 ================= -->
  <section id="screen-game" class="screen">
    <div class="hill h-a"></div>
    <div class="hill h-b"></div>
    <header id="hud">
      <a id="btn-home" class="icon-btn" href="index.html" aria-label="回太空站">🏠</a>
      <div id="problem-display"><span id="goal-text">?</span></div>
      <div id="stars"><i>⭐</i><i>⭐</i><i>⭐</i><i>⭐</i><i>⭐</i></div>
      <button id="btn-sound" class="icon-btn" aria-label="音效開關">🔊</button>
    </header>

    <!-- 大時鐘（SVG 鐘面由 JS 建構）＋ HTML 拖曳把手（只用 left/top 定位，不用 transform） -->
    <div id="clock-wrap">
      <svg id="clock-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="tap-anchor"></div>
      <div id="minute-handle" class="handle off" aria-label="分針把手"></div>
      <div id="hour-handle" class="handle off" aria-label="時針把手"></div>
    </div>

    <div id="mid-row">
      <div id="guide">
        <div id="lottie-guide"></div>
        <div id="sweat">💧</div>
        <div id="bubble"></div>
      </div>
    </div>

    <div id="answers"></div>

    <div id="sprite-layer"></div>
    <div id="fx-layer">
      <div id="counter"></div>
      <div id="caption"></div>
      <div id="hint-hand">👆</div>
    </div>
  </section>

  <!-- ================= 結算畫面 ================= -->
  <section id="screen-end" class="screen">
    <div class="hill h-a"></div>
    <div class="hill h-b"></div>
    <div id="end-title">太棒了！</div>
    <div id="end-stars"></div>
    <div id="end-msg"></div>
    <div id="end-chars">
      <img id="end-deco-mammoth" src="assets/deco_news_mammoth.png" alt="">
      <div id="lottie-end-boy"></div>
    </div>
    <div id="end-btns">
      <button id="btn-again" class="big-btn">再玩一次 🔁</button>
      <button id="btn-menu" class="big-btn alt">回太空站 🌌</button>
    </div>
  </section>

  <!-- 從太空站入口進來時的出發按鈕（同時解鎖手機音訊） -->
  <div id="start-overlay">
    <div id="start-card">
      <img src="assets/deco_news_hedgehog.png" alt="">
      <div id="start-mode-label"></div>
      <button id="btn-start" class="big-btn">🚀 出發！</button>
    </div>
  </div>

  <div id="rotate-overlay">
    <div class="phone-icon">📱</div>
    <div>請把手機轉直來玩喔！</div>
  </div>
</div>

<script src="js/zoomguard.js?v=1"></script>
<script src="js/starmap.js?v=1"></script>
<script src="vendor/lottie.min.js"></script>
<script src="js/characters.js?v=5"></script>
<script src="js/sounds.js?v=6"></script>
<script src="js/engine.js?v=2"></script>
<script src="js/clock.logic.js?v=1"></script>
<script src="js/clock.main.js?v=1"></script>
</body>
</html>
