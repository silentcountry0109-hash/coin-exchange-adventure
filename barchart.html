<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#bde4f8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>長條圖樂園｜Danlu Kids Space</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='16' y='48' width='18' height='34' rx='3' fill='%2358b368'/><rect x='41' y='24' width='18' height='58' rx='3' fill='%232f9e8a'/><rect x='66' y='36' width='18' height='46' rx='3' fill='%234a7cc9'/><path d='M12 14V86H90' fill='none' stroke='%233a3844' stroke-width='7' stroke-linecap='round'/></svg>">
<link rel="stylesheet" href="css/style.css?v=6">
<link rel="stylesheet" href="css/barchart.css?v=2">
</head>
<body>
<div id="app">

  <div id="bg-sky">
    <div class="cloud c-a"></div>
    <div class="cloud c-b"></div>
    <div class="cloud c-c"></div>
  </div>

  <!-- ================= 標題（選關卡） ================= -->
  <section id="screen-title" class="screen active">
    <div class="hill h-a"></div>
    <div class="hill h-b"></div>
    <a id="btn-space" class="icon-btn" href="index.html" aria-label="回太空站">🌌</a>
    <div id="logo" aria-label="長條圖樂園">
      <span>長</span><span>條</span><span>圖</span>
    </div>
    <div id="title-sub">一格一格堆・看圖找答案</div>
    <div id="title-chars">
      <div id="lottie-title-elephant"></div>
      <div id="lottie-title-boy"></div>
    </div>
    <div id="title-menu">
      <button class="mode-btn lv1" data-mode="lv1">📊 讀長條圖</button>
      <button class="mode-btn lv2" data-mode="lv2">🧱 蓋長條圖</button>
      <button class="mode-btn lv3 wide" data-mode="lv3">➗ 比較問答</button>
    </div>
  </section>

  <!-- ================= 遊戲 ================= -->
  <section id="screen-game" class="screen">
    <header id="hud">
      <button id="btn-home" class="icon-btn" aria-label="回選單">🏠</button>
      <div id="problem-display"><span id="pd-label">長條圖</span></div>
      <div id="stars"><i>⭐</i><i>⭐</i><i>⭐</i><i>⭐</i><i>⭐</i></div>
      <button id="btn-sound" class="icon-btn" aria-label="音效開關">🔊</button>
    </header>

    <div id="chart-stage">
      <div id="chart-theme">📊 長條圖</div>
      <div id="source-row" aria-label="題目資料"></div>
      <div id="chart-board">
        <div id="chart-plot">
          <div id="y-axis"></div>
          <div id="bars-area"></div>
        </div>
      </div>
    </div>

    <div id="mid-row">
      <div id="guide">
        <div id="lottie-guide"></div>
        <div id="sweat">💧</div>
        <div id="bubble"></div>
      </div>
    </div>

    <div id="answers"></div>

    <div id="sprite-layer"></div>
    <div id="fx-layer">
      <div id="counter"></div>
      <div id="caption"></div>
      <div id="hint-hand">👆</div>
    </div>
  </section>

  <!-- ================= 結算 ================= -->
  <section id="screen-end" class="screen">
    <div class="hill h-a"></div>
    <div class="hill h-b"></div>
    <div id="end-title">長條圖高手！</div>
    <div id="end-stars"></div>
    <div id="end-msg"></div>
    <div id="end-chars">
      <img id="end-deco-mammoth" src="assets/deco_news_mammoth.png" alt="">
      <div id="lottie-end-boy"></div>
    </div>
    <div id="end-btns">
      <button id="btn-again" class="big-btn">再玩一次 🔁</button>
      <button id="btn-menu" class="big-btn alt">換一關 🗺️</button>
    </div>
  </section>

  <img id="rocket-hedgehog" src="assets/deco_news_hedgehog.png" alt="">

  <div id="start-overlay">
    <div id="start-card">
      <img src="assets/deco_hedgehog.png" alt="">
      <div id="start-mode-label"></div>
      <button id="btn-start" class="big-btn">🚀 出發！</button>
    </div>
  </div>

  <div id="rotate-overlay">
    <div class="phone-icon">📱</div>
    <div>請把手機轉直來玩喔！</div>
  </div>
</div>

<script src="js/zoomguard.js?v=1"></script>
<script src="js/starmap.js?v=1"></script>
<script src="vendor/lottie.min.js"></script>
<script src="js/characters.js?v=5"></script>
<script src="js/sounds.js?v=9"></script>
<script src="js/engine.js?v=2"></script>
<script src="js/barchart.logic.js?v=1"></script>
<script src="js/barchart.main.js?v=1"></script>
</body>
</html>
